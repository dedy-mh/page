<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Make CV Dedy Martin Hutagalung</title>

<link rel="icon" href="favicon-dmh.svg" type="image/svg+xml">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef4ff;
color:#111827;
}

.container{
display:flex;
min-height:100vh;
}

.sidebar{
width:380px;
background:#ffffff;
padding:20px;
overflow:auto;
border-right:1px solid #cbd5e1;
}

.preview{
flex:1;
padding:20px;
overflow:auto;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:12px;
border:1px solid #cbd5e1;
border-radius:6px;
box-sizing:border-box;
font-size:14px;
}

textarea{
min-height:90px;
resize:vertical;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:#1d4ed8;
color:#fff;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
width:100%;
transition:.2s;
}

button:hover{
background:#1e40af;
}

.add-btn{
background:#2563eb;
}

.remove-btn{
background:#dc2626;
margin-top:5px;
}

.remove-btn:hover{
background:#b91c1c;
}

.section-box{
padding:12px;
border:1px solid #dbeafe;
border-radius:8px;
margin-bottom:15px;
background:#f8fbff;
}

.cv{
background:#fff;
max-width:850px;
margin:auto;
padding:35px;
border-top:6px solid #1d4ed8;
}

.cv h1{
margin-bottom:5px;
font-size:34px;
color:#1d4ed8;
}

.section{
margin-top:24px;
page-break-inside:avoid;
break-inside:avoid;
}

.section-title{
font-size:18px;
font-weight:bold;
color:#1d4ed8;
border-bottom:2px solid #1d4ed8;
padding-bottom:5px;
margin-bottom:10px;
text-transform:uppercase;
}

.content{
line-height:1.8;
white-space:pre-line;
text-align:justify;
}

.item{
margin-bottom:16px;
page-break-inside:avoid;
break-inside:avoid;
}

.item-title{
font-weight:bold;
font-size:16px;
}

.item-sub{
font-size:14px;
color:#4b5563;
}

ul{
padding-left:20px;
}

a{
text-decoration:none;
color:#2563eb;
word-break:break-word;
}

.contact-item{
margin-bottom:6px;
line-height:1.7;
word-break:break-word;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h2>ATS CV Builder 2026</h2>

<input type="text" id="name" placeholder="Nama Lengkap">

<input type="text" id="position" placeholder="Posisi / Jabatan">
<input type="text" id="positionLink" placeholder="Link posisi / perusahaan">

<input type="email" id="email" placeholder="Email">
<input type="text" id="emailLink" placeholder="mailto:email@gmail.com">

<input type="text" id="phone1" placeholder="Nomor HP 1">
<input type="text" id="phone1Link" placeholder="https://wa.me/...">

<input type="text" id="phone2" placeholder="Nomor HP 2">
<input type="text" id="phone2Link" placeholder="https://wa.me/...">

<input type="text" id="linkedin" placeholder="LinkedIn">
<input type="text" id="linkedinLink" placeholder="https://linkedin.com/in/...">

<input type="text" id="portfolio" placeholder="Portfolio">
<input type="text" id="portfolioLink" placeholder="https://portfolio.com">

<input type="text" id="location" placeholder="Lokasi">

<textarea id="summary" placeholder="Professional Summary"></textarea>

<h3>Pengalaman Kerja</h3>
<div id="experienceContainer"></div>
<button class="add-btn" onclick="addExperience()">+ Tambah Pengalaman</button>

<h3>Pendidikan</h3>
<div id="educationContainer"></div>
<button class="add-btn" onclick="addEducation()">+ Tambah Pendidikan</button>

<h3>Hard Skill</h3>
<div id="hardSkillContainer"></div>
<button class="add-btn" onclick="addHardSkill()">+ Tambah Hard Skill</button>

<h3>Soft Skill</h3>
<div id="softSkillContainer"></div>
<button class="add-btn" onclick="addSoftSkill()">+ Tambah Soft Skill</button>

<h3>Sertifikat / Pelatihan</h3>
<div id="certificateContainer"></div>
<button class="add-btn" onclick="addCertificate()">+ Tambah Sertifikat</button>

<h3>Bahasa</h3>
<div id="languageContainer"></div>
<button class="add-btn" onclick="addLanguage()">+ Tambah Bahasa</button>

<hr>

<button onclick="downloadPDF()">Export PDF</button>
<button onclick="exportHTML()">Export HTML</button>
<button onclick="resetForm()">Reset</button>

</div>

<div class="preview">

<div class="cv" id="cvPreview">

<h1 id="p_name">Nama Lengkap</h1>

<div id="p_position"></div>

<br>

<div id="p_contact"></div>

<div class="section">
<div class="section-title">Professional Summary</div>
<div class="content" id="p_summary"></div>
</div>

<div class="section">
<div class="section-title">Work Experience</div>
<div id="p_experience"></div>
</div>

<div class="section">
<div class="section-title">Education</div>
<div id="p_education"></div>
</div>

<div class="section">
<div class="section-title">Hard Skills</div>
<ul id="p_hardskills"></ul>
</div>

<div class="section">
<div class="section-title">Soft Skills</div>
<ul id="p_softskills"></ul>
</div>

<div class="section">
<div class="section-title">Certifications & Training</div>
<div id="p_certificates"></div>
</div>

<div class="section">
<div class="section-title">Languages</div>
<ul id="p_languages"></ul>
</div>

</div>
</div>
</div>

<script>

function linkHTML(text, link){

if(!text) return '';

if(!link) return text;

return '<a href="'+link+'" target="_blank">'+text+'</a>';

}

function bindInputs(){

const elements=document.querySelectorAll('input, textarea');

elements.forEach(function(el){

el.removeEventListener('input', handleInput);
el.addEventListener('input', handleInput);

});

}

function handleInput(){

updatePreview();
saveDraft();

}

function removeSection(button){

button.parentElement.remove();

updatePreview();
saveDraft();

}

function addExperience(data={}){

const div=document.createElement('div');

div.className='section-box exp-item';

div.innerHTML=
'<input type="text" class="exp-company" placeholder="Nama Perusahaan" value="'+(data.company || '')+'">'+
'<input type="text" class="exp-role" placeholder="Posisi" value="'+(data.role || '')+'">'+
'<input type="text" class="exp-date" placeholder="Jan 2024 - Mar 2026" value="'+(data.date || '')+'">'+
'<textarea class="exp-desc" placeholder="Tugas pekerjaan (1 baris = 1 bullet point)">'+(data.desc || '')+'</textarea>'+
'<button class="remove-btn" onclick="removeSection(this)">Hapus</button>';

document.getElementById('experienceContainer').appendChild(div);

bindInputs();
updatePreview();

}

function addEducation(data={}){

const div=document.createElement('div');

div.className='section-box edu-item';

div.innerHTML=
'<input type="text" class="edu-school" placeholder="Universitas / Sekolah" value="'+(data.school || '')+'">'+
'<input type="text" class="edu-major" placeholder="Jurusan" value="'+(data.major || '')+'">'+
'<input type="text" class="edu-date" placeholder="2020 - 2024" value="'+(data.date || '')+'">'+
'<button class="remove-btn" onclick="removeSection(this)">Hapus</button>';

document.getElementById('educationContainer').appendChild(div);

bindInputs();
updatePreview();

}

function addHardSkill(value=''){

const div=document.createElement('div');

div.className='section-box';

div.innerHTML=
'<input type="text" class="hard-skill" placeholder="Hard Skill" value="'+value+'">'+
'<button class="remove-btn" onclick="removeSection(this)">Hapus</button>';

document.getElementById('hardSkillContainer').appendChild(div);

bindInputs();
updatePreview();

}

function addSoftSkill(value=''){

const div=document.createElement('div');

div.className='section-box';

div.innerHTML=
'<input type="text" class="soft-skill" placeholder="Soft Skill" value="'+value+'">'+
'<button class="remove-btn" onclick="removeSection(this)">Hapus</button>';

document.getElementById('softSkillContainer').appendChild(div);

bindInputs();
updatePreview();

}

function addCertificate(data={}){

const div=document.createElement('div');

div.className='section-box cert-item';

div.innerHTML=
'<input type="text" class="cert-name" placeholder="Nama Sertifikat" value="'+(data.name || '')+'">'+
'<input type="text" class="cert-org" placeholder="Penerbit" value="'+(data.org || '')+'">'+
'<button class="remove-btn" onclick="removeSection(this)">Hapus</button>';

document.getElementById('certificateContainer').appendChild(div);

bindInputs();
updatePreview();

}

function addLanguage(value=''){

const div=document.createElement('div');

div.className='section-box';

div.innerHTML=
'<input type="text" class="language" placeholder="Bahasa & Level" value="'+value+'">'+
'<button class="remove-btn" onclick="removeSection(this)">Hapus</button>';

document.getElementById('languageContainer').appendChild(div);

bindInputs();
updatePreview();

}

function updatePreview(){

document.getElementById('p_name').innerText=
document.getElementById('name').value || 'Nama Lengkap';

document.getElementById('p_position').innerHTML=
linkHTML(
document.getElementById('position').value,
document.getElementById('positionLink').value
);

const email=linkHTML(
document.getElementById('email').value,
document.getElementById('emailLink').value
);

const phone1=linkHTML(
document.getElementById('phone1').value,
document.getElementById('phone1Link').value
);

const phone2=linkHTML(
document.getElementById('phone2').value,
document.getElementById('phone2Link').value
);

const linkedin=linkHTML(
document.getElementById('linkedin').value,
document.getElementById('linkedinLink').value
);

const portfolio=linkHTML(
document.getElementById('portfolio').value,
document.getElementById('portfolioLink').value
);

const location=document.getElementById('location').value;

const phoneDisplay=[phone1,phone2]
.filter(Boolean)
.join(' / ');

let contact='';

if(email){
contact += '<div class="contact-item"><strong>Email:</strong> '+email+'</div>';
}

if(phoneDisplay){
contact += '<div class="contact-item"><strong>Phone:</strong> '+phoneDisplay+'</div>';
}

if(linkedin){
contact += '<div class="contact-item"><strong>LinkedIn:</strong> '+linkedin+'</div>';
}

if(portfolio){
contact += '<div class="contact-item"><strong>Portfolio:</strong> '+portfolio+'</div>';
}

if(location){
contact += '<div class="contact-item"><strong>Location:</strong> '+location+'</div>';
}

document.getElementById('p_contact').innerHTML=contact;

document.getElementById('p_summary').innerText=
document.getElementById('summary').value;

let expHTML='';

document.querySelectorAll('.exp-item').forEach(function(item){

const company=item.querySelector('.exp-company').value;
const role=item.querySelector('.exp-role').value;
const date=item.querySelector('.exp-date').value;
const desc=item.querySelector('.exp-desc').value;

expHTML +=
'<div class="item">'+
'<div class="item-title">'+role+' - '+company+'</div>'+
'<div class="item-sub">'+date+'</div>'+
'<div class="content"><ul>' +

desc.split('\n').map(function(item){
return item.trim() ? '<li>'+item+'</li>' : '';
}).join('')

+

'</ul></div>'+
'</div>';

});

document.getElementById('p_experience').innerHTML=expHTML;

let eduHTML='';

document.querySelectorAll('.edu-item').forEach(function(item){

const school=item.querySelector('.edu-school').value;
const major=item.querySelector('.edu-major').value;
const date=item.querySelector('.edu-date').value;

eduHTML +=
'<div class="item">'+
'<div class="item-title">'+school+'</div>'+
'<div>'+major+'</div>'+
'<div class="item-sub">'+date+'</div>'+
'</div>';

});

document.getElementById('p_education').innerHTML=eduHTML;

let hard='';

document.querySelectorAll('.hard-skill').forEach(function(el){

if(el.value){
hard += '<li>'+el.value+'</li>';
}

});

document.getElementById('p_hardskills').innerHTML=hard;

let soft='';

document.querySelectorAll('.soft-skill').forEach(function(el){

if(el.value){
soft += '<li>'+el.value+'</li>';
}

});

document.getElementById('p_softskills').innerHTML=soft;

let cert='';

document.querySelectorAll('.cert-item').forEach(function(item){

const name=item.querySelector('.cert-name').value;
const org=item.querySelector('.cert-org').value;

cert +=
'<div class="item">'+
'<div class="item-title">'+name+'</div>'+
'<div>'+org+'</div>'+
'</div>';

});

document.getElementById('p_certificates').innerHTML=cert;

let lang='';

document.querySelectorAll('.language').forEach(function(el){

if(el.value){
lang += '<li>'+el.value+'</li>';
}

});

document.getElementById('p_languages').innerHTML=lang;

}

function getFormData(){

return {

name:document.getElementById('name').value,
position:document.getElementById('position').value,
positionLink:document.getElementById('positionLink').value,

email:document.getElementById('email').value,
emailLink:document.getElementById('emailLink').value,

phone1:document.getElementById('phone1').value,
phone1Link:document.getElementById('phone1Link').value,

phone2:document.getElementById('phone2').value,
phone2Link:document.getElementById('phone2Link').value,

linkedin:document.getElementById('linkedin').value,
linkedinLink:document.getElementById('linkedinLink').value,

portfolio:document.getElementById('portfolio').value,
portfolioLink:document.getElementById('portfolioLink').value,

location:document.getElementById('location').value,
summary:document.getElementById('summary').value,

experience:[...document.querySelectorAll('.exp-item')].map(item=>({
company:item.querySelector('.exp-company').value,
role:item.querySelector('.exp-role').value,
date:item.querySelector('.exp-date').value,
desc:item.querySelector('.exp-desc').value
})),

education:[...document.querySelectorAll('.edu-item')].map(item=>({
school:item.querySelector('.edu-school').value,
major:item.querySelector('.edu-major').value,
date:item.querySelector('.edu-date').value
})),

hardSkills:[...document.querySelectorAll('.hard-skill')].map(el=>el.value),

softSkills:[...document.querySelectorAll('.soft-skill')].map(el=>el.value),

certificates:[...document.querySelectorAll('.cert-item')].map(item=>({
name:item.querySelector('.cert-name').value,
org:item.querySelector('.cert-org').value
})),

languages:[...document.querySelectorAll('.language')].map(el=>el.value)

};

}

function saveDraft(){

localStorage.setItem(
'cvATSModernBlue',
JSON.stringify(getFormData())
);

}

function loadDraft(){

const saved=localStorage.getItem('cvATSModernBlue');

if(!saved) return;

const data=JSON.parse(saved);

document.getElementById('name').value=data.name || '';
document.getElementById('position').value=data.position || '';
document.getElementById('positionLink').value=data.positionLink || '';

document.getElementById('email').value=data.email || '';
document.getElementById('emailLink').value=data.emailLink || '';

document.getElementById('phone1').value=data.phone1 || '';
document.getElementById('phone1Link').value=data.phone1Link || '';

document.getElementById('phone2').value=data.phone2 || '';
document.getElementById('phone2Link').value=data.phone2Link || '';

document.getElementById('linkedin').value=data.linkedin || '';
document.getElementById('linkedinLink').value=data.linkedinLink || '';

document.getElementById('portfolio').value=data.portfolio || '';
document.getElementById('portfolioLink').value=data.portfolioLink || '';

document.getElementById('location').value=data.location || '';
document.getElementById('summary').value=data.summary || '';

document.getElementById('experienceContainer').innerHTML='';
document.getElementById('educationContainer').innerHTML='';
document.getElementById('hardSkillContainer').innerHTML='';
document.getElementById('softSkillContainer').innerHTML='';
document.getElementById('certificateContainer').innerHTML='';
document.getElementById('languageContainer').innerHTML='';

(data.experience || []).forEach(addExperience);
(data.education || []).forEach(addEducation);
(data.hardSkills || []).forEach(addHardSkill);
(data.softSkills || []).forEach(addSoftSkill);
(data.certificates || []).forEach(addCertificate);
(data.languages || []).forEach(addLanguage);

updatePreview();

}

function downloadPDF(){

const element=document.getElementById('cvPreview');

const opt={
margin:[10,10,10,10],
filename:'CV-ATS.pdf',
image:{
type:'jpeg',
quality:1
},
html2canvas:{
scale:2,
useCORS:true,
scrollY:0
},
jsPDF:{
unit:'mm',
format:'a4',
orientation:'portrait'
}
};

html2pdf()
.set(opt)
.from(element)
.save();

}

function exportHTML(){

const cvContent =
document.getElementById('cvPreview').outerHTML;

const nama =
document.getElementById('name').value ||
'ATS';

const html = `
<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CV ${nama}</title>

<link rel="icon"
href="favicon-dmh.svg"
type="image/svg+xml">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#eef4ff;
color:#111827;
padding:20px;
}

.cv{
background:#fff;
max-width:850px;
margin:auto;
padding:35px;
border-top:6px solid #1d4ed8;
}

.cv h1{
margin-bottom:5px;
font-size:34px;
color:#1d4ed8;
}

.section{
margin-top:24px;
page-break-inside:avoid;
break-inside:avoid;
}

.section-title{
font-size:18px;
font-weight:bold;
color:#1d4ed8;
border-bottom:2px solid #1d4ed8;
padding-bottom:5px;
margin-bottom:10px;
text-transform:uppercase;
}

.content{
line-height:1.8;
white-space:pre-line;
text-align:justify;
}

.item{
margin-bottom:16px;
page-break-inside:avoid;
break-inside:avoid;
}

.item-title{
font-weight:bold;
font-size:16px;
}

.item-sub{
font-size:14px;
color:#4b5563;
}

ul{
padding-left:20px;
}

a{
text-decoration:none;
color:#2563eb;
word-break:break-word;
}

table{
width:100%;
}

td{
vertical-align:top;
padding-bottom:4px;
}

button{
padding:10px 14px;
border:none;
border-radius:6px;
background:#1d4ed8;
color:#fff;
font-weight:bold;
cursor:pointer;
max-width:220px;
margin-bottom:20px;
}

</style>

</head>

<body>

<button onclick="downloadPDF()">
Download PDF
</button>

${cvContent}

<script>

function downloadPDF(){

const element =
document.getElementById('cvPreview');

html2pdf()
.set({
margin:[10,10,10,10],
filename:'CV-${nama.replace(/\s+/g,'-')}.pdf',
image:{
type:'jpeg',
quality:1
},
html2canvas:{
scale:2,
useCORS:true
},
jsPDF:{
unit:'mm',
format:'a4',
orientation:'portrait'
},
pagebreak:{
mode:['css','legacy']
}
})
.from(element)
.save();

}

<\/script>

</body>
</html>
`;

const blob =
new Blob([html],{
type:'text/html'
});

const url =
URL.createObjectURL(blob);

const a =
document.createElement('a');

a.href = url;

a.download =
'CV-' +
nama
.trim()
.replace(/\s+/g,'-')
.replace(/[^\w\-]/g,'') +
'.html';

a.click();

URL.revokeObjectURL(url);

}

function resetForm(){

localStorage.removeItem('cvATSModernBlue');

location.reload();

}

loadDraft();

if(document.querySelectorAll('.exp-item').length===0){
addExperience();
}

if(document.querySelectorAll('.edu-item').length===0){
addEducation();
}

if(document.querySelectorAll('.hard-skill').length===0){
addHardSkill();
}

if(document.querySelectorAll('.soft-skill').length===0){
addSoftSkill();
}

if(document.querySelectorAll('.cert-item').length===0){
addCertificate();
}

if(document.querySelectorAll('.language').length===0){
addLanguage();
}

bindInputs();
updatePreview();

</script>

</body>
</html>
